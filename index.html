<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizador de Vida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

    <h1>Optimizador de Vida</h1>

    <div class="info">
        <p><strong>Día actual:</strong> <span id="dia"></span></p>
        <p><strong>Hora actual:</strong> <span id="hora"></span></p>
    </div>

    <h2>Actividades del día</h2>

    <div id="actividades"></div>

    <button onclick="generarCronograma()">
        Actualizar cronograma
    </button>

    <h2>Cronograma generado</h2>

    <div id="cronograma"></div>

    <h2>Nueva actividad</h2>

    <input type="text" id="nombreActividad"
           placeholder="Ej: Jugar Play">

    <input type="number" id="duracionActividad"
           placeholder="Duración en horas">

    <button onclick="evaluarActividad()">
        ¿Puedo hacerla?
    </button>

    <div id="resultado"></div>

</div>

<script src="script.js"></script>
<script> if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./service-worker.js') .then(() => console.log("Service Worker registrado")); } </script>
</body>
</html>
